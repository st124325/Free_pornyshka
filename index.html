<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Flow</title>
  <meta name="description" content="Минималистичная медиа-лента с фото и видео в одном HTML-файле." />
  <style>
    :root {
      --bg: #fbfbfa;
      --surface: #ffffff;
      --text: #111111;
      --muted: #6b6b6b;
      --line: #e8e8e8;
      --line-strong: #dcdcdc;
      --shadow: 0 12px 40px rgba(17, 17, 17, 0.06);
      --radius: 24px;
      --container: 1280px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--bg);
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0,0,0,0.02), transparent 30%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    img, video {
      display: block;
      max-width: 100%;
    }

    button, input {
      font: inherit;
    }

    .shell {
      width: min(calc(100% - 32px), var(--container));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(251, 251, 250, 0.78);
      border-bottom: 1px solid rgba(232, 232, 232, 0.9);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 84px;
      padding: 18px 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      font-weight: 650;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .search-wrap {
      flex: 0 1 380px;
      width: 100%;
    }

    .search {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      padding: 0 18px;
      color: var(--text);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.03);
    }

    .search::placeholder {
      color: var(--muted);
    }

    .search:focus {
      border-color: #cfcfcf;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.05);
      background: #fff;
    }

    main {
      padding: 28px 0 56px;
    }

    .feed {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 20px;
      align-items: start;
    }

    .card {
      grid-column: span 12;
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
      cursor: pointer;
      isolation: isolate;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 48px rgba(17,17,17,0.08);
      border-color: var(--line-strong);
    }

    .media-wrap {
      position: relative;
      width: 100%;
      background:
        linear-gradient(135deg, #f4f4f4, #ededed);
      aspect-ratio: 4 / 5;
      overflow: hidden;
    }

    .media-wrap img,
    .media-wrap video,
    .modal-media img,
    .modal-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #f2f2f2;
    }

    .media-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to top, rgba(0,0,0,0.08), transparent 32%);
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .card:hover .media-wrap::after {
      opacity: 1;
    }

    .video-indicator {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 2;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      background: rgba(17,17,17,0.7);
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .card-body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px 18px;
    }

    .card-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 560;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    .card-meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .open-hint {
      flex: none;
      color: var(--muted);
      font-size: 0.9rem;
      padding-left: 8px;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #f7f7f7, #efefef);
      color: var(--muted);
    }

    .fallback strong {
      color: var(--text);
      font-weight: 600;
    }

    .fallback small {
      font-size: 0.82rem;
      word-break: break-all;
    }

    .card.is-missing .fallback,
    .modal-media.is-missing .fallback {
      display: flex;
    }

    .card.is-missing .media-wrap > img,
    .card.is-missing .media-wrap > video,
    .modal-media.is-missing > img,
    .modal-media.is-missing > video {
      opacity: 0;
      pointer-events: none;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 56px 24px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.7);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,10,0.84);
      z-index: 100;
      padding: 18px;
    }

    .modal.open {
      display: flex;
    }

    .modal-panel {
      position: relative;
      width: min(1200px, 100%);
      height: min(90vh, 920px);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      border-radius: 28px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 28px 80px rgba(0,0,0,0.35);
    }

    .modal-media {
      position: relative;
      width: 100%;
      height: 100%;
      background: #0f0f0f;
    }

    .modal-media img,
    .modal-media video {
      object-fit: contain;
    }

    .modal-fade {
      position: absolute;
      inset: auto 0 0 0;
      padding: 24px 22px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.62), transparent);
      color: rgba(255,255,255,0.96);
      pointer-events: none;
    }

    .modal-title {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 560;
      letter-spacing: -0.02em;
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: rgba(255,255,255,0.7);
      font-size: 0.94rem;
    }

    .modal-btn,
    .nav-btn {
      position: absolute;
      z-index: 5;
      appearance: none;
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      transition: transform 160ms ease, background-color 160ms ease, opacity 160ms ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-btn:hover,
    .nav-btn:hover {
      transform: translateY(-1px);
    }

    .modal-btn {
      top: 16px;
      right: 16px;
      width: 46px;
      height: 46px;
      font-size: 1.35rem;
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .nav-btn {
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      font-size: 1.5rem;
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .nav-btn:hover {
      transform: translateY(calc(-50% - 1px));
    }

    .nav-prev { left: 16px; }
    .nav-next { right: 16px; }

    .modal-counter {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 5;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    @media (min-width: 700px) {
      .card {
        grid-column: span 6;
      }
    }

    @media (min-width: 1100px) {
      .card {
        grid-column: span 4;
      }
    }

    @media (max-width: 700px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .search-wrap {
        flex-basis: auto;
      }

      .card-body {
        align-items: flex-start;
        flex-direction: column;
      }

      .open-hint {
        padding-left: 0;
      }

      .modal {
        padding: 8px;
      }

      .modal-panel {
        height: min(92vh, 1000px);
        border-radius: 22px;
      }

      .nav-btn {
        width: 46px;
        height: 46px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <div class="brand">
        <h1>Media Flow</h1>
        <p>Простая медиа-лента без регистрации</p>
      </div>

      <div class="search-wrap">
        <input
          id="searchInput"
          class="search"
          type="search"
          placeholder="Поиск по имени файла"
          aria-label="Поиск по имени файла"
          autocomplete="off"
        />
      </div>
    </div>
  </header>

  <main class="shell">
    <section id="feed" class="feed" aria-live="polite"></section>
  </main>

  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-label="Просмотр медиа">
    <div class="modal-panel">
      <button id="closeModal" class="modal-btn" type="button" aria-label="Закрыть просмотр">×</button>
      <button id="prevModal" class="nav-btn nav-prev" type="button" aria-label="Предыдущий элемент">‹</button>
      <button id="nextModal" class="nav-btn nav-next" type="button" aria-label="Следующий элемент">›</button>
      <div id="modalCounter" class="modal-counter">1 / 1</div>

      <div id="modalMedia" class="modal-media">
        <div class="fallback">
          <strong>Файл не найден</strong>
          <small></small>
        </div>
      </div>

      <div class="modal-fade">
        <h2 id="modalTitle" class="modal-title"></h2>
        <p id="modalSubtitle" class="modal-subtitle"></p>
      </div>
    </div>
  </div>

  <script>
    const mediaItems = [
      { type: 'photo', src: 'photo1.jpg' },
      { type: 'photo', src: 'photo2.jpg' },
      { type: 'photo', src: 'photo3.jpg' },
      { type: 'video', src: 'video1.mp4', poster: 'cover1.jpg' },
      { type: 'video', src: 'video2.mp4' }
    ].map(item => ({
      ...item,
      title: getFileNameWithoutExtension(item.src)
    }));

    const feed = document.getElementById('feed');
    const searchInput = document.getElementById('searchInput');
    const modal = document.getElementById('modal');
    const modalMedia = document.getElementById('modalMedia');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const modalCounter = document.getElementById('modalCounter');
    const closeModalBtn = document.getElementById('closeModal');
    const prevModalBtn = document.getElementById('prevModal');
    const nextModalBtn = document.getElementById('nextModal');

    let searchQuery = '';
    let visibleItems = [...mediaItems];
    let currentModalIndex = 0;
    let autoplayObserver = null;

    function getFileNameWithoutExtension(path) {
      const fileName = String(path).split('/').pop() || '';
      const lastDotIndex = fileName.lastIndexOf('.');
      return lastDotIndex > 0 ? fileName.slice(0, lastDotIndex) : fileName;
    }

    function createFallbackMarkup(src) {
      return `
        <div class="fallback">
          <strong>Файл не найден</strong>
          <small>${escapeHtml(src)}</small>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, function(char) {
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        };
        return map[char];
      });
    }

    function getVisibleItems() {
      const q = searchQuery.trim().toLowerCase();
      if (!q) return [...mediaItems];

      return mediaItems.filter(item => {
        const title = item.title.toLowerCase();
        const src = item.src.toLowerCase();
        return title.includes(q) || src.includes(q);
      });
    }

    function renderFeed() {
      visibleItems = getVisibleItems();
      feed.innerHTML = '';

      if (!visibleItems.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'Ничего не найдено.';
        feed.appendChild(empty);
        return;
      }

      visibleItems.forEach((item, index) => {
        const article = document.createElement('article');
        article.className = 'card';
        article.setAttribute('tabindex', '0');
        article.setAttribute('role', 'button');
        article.setAttribute('aria-label', `${item.title}. Открыть в полноэкранном режиме`);
        article.dataset.index = String(index);

        const metaLabel = item.type === 'photo' ? 'Изображение' : 'Видео';

        let mediaMarkup = '';
        if (item.type === 'photo') {
          mediaMarkup = `
            <img
              src="${item.src}"
              alt="${escapeHtml(item.title)}"
              loading="lazy"
              decoding="async"
              onerror="markCardMissing(this, '${escapeHtml(item.src)}')"
            />
          `;
        } else {
          mediaMarkup = `
            <video
              src="${item.src}"
              ${item.poster ? `poster="${item.poster}"` : ''}
              muted
              loop
              playsinline
              preload="metadata"
              onerror="markCardMissing(this, '${escapeHtml(item.src)}')"
            ></video>
          `;
        }

        article.innerHTML = `
          <div class="media-wrap">
            ${item.type === 'video' ? '<div class="video-indicator">Muted</div>' : ''}
            ${mediaMarkup}
            ${createFallbackMarkup(item.src)}
          </div>
          <div class="card-body">
            <div>
              <h2 class="card-title">${escapeHtml(item.title)}</h2>
              <p class="card-meta">${metaLabel}</p>
            </div>
            <div class="open-hint">Open</div>
          </div>
        `;

        article.addEventListener('click', (event) => {
          const isControl = event.target.closest('button');
          if (!isControl) openModal(index);
        });

        article.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openModal(index);
          }
        });

        feed.appendChild(article);
      });

      setupVideoAutoplay();
    }

    function markCardMissing(element, src) {
      const card = element.closest('.card');
      if (!card) return;
      card.classList.add('is-missing');
      const fallbackText = card.querySelector('.fallback small');
      if (fallbackText) fallbackText.textContent = src;
      if (element.tagName === 'VIDEO') {
        try { element.pause(); } catch (_) {}
      }
    }

    function markModalMissing(src) {
      modalMedia.classList.add('is-missing');
      const fallbackText = modalMedia.querySelector('.fallback small');
      if (fallbackText) fallbackText.textContent = src;
    }

    window.markCardMissing = markCardMissing;

    function setupVideoAutoplay() {
      if (autoplayObserver) {
        autoplayObserver.disconnect();
      }

      const videos = Array.from(document.querySelectorAll('.card video'));
      if (!('IntersectionObserver' in window) || !videos.length) return;

      autoplayObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          const video = entry.target;
          if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
            const playPromise = video.play();
            if (playPromise && typeof playPromise.catch === 'function') {
              playPromise.catch(() => {});
            }
          } else {
            video.pause();
          }
        });
      }, { threshold: [0, 0.3, 0.6, 0.9] });

      videos.forEach(video => autoplayObserver.observe(video));
    }

    function openModal(index) {
      currentModalIndex = index;
      updateModal();
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      const activeVideo = modalMedia.querySelector('video');
      if (activeVideo) activeVideo.pause();
      modalMedia.classList.remove('is-missing');
    }

    function updateModal() {
      const item = visibleItems[currentModalIndex];
      if (!item) return;

      modalMedia.classList.remove('is-missing');

      let mediaElement;
      if (item.type === 'photo') {
        mediaElement = document.createElement('img');
        mediaElement.src = item.src;
        mediaElement.alt = item.title;
        mediaElement.loading = 'eager';
        mediaElement.decoding = 'async';
        mediaElement.onerror = () => markModalMissing(item.src);
      } else {
        mediaElement = document.createElement('video');
        mediaElement.src = item.src;
        mediaElement.poster = item.poster || '';
        mediaElement.controls = true;
        mediaElement.autoplay = true;
        mediaElement.muted = true;
        mediaElement.loop = true;
        mediaElement.playsInline = true;
        mediaElement.preload = 'metadata';
        mediaElement.onerror = () => markModalMissing(item.src);
      }

      modalMedia.innerHTML = createFallbackMarkup(item.src);
      modalMedia.prepend(mediaElement);

      modalTitle.textContent = item.title;
      modalSubtitle.textContent = item.type === 'photo' ? 'Изображение' : 'Видео';
      modalCounter.textContent = `${currentModalIndex + 1} / ${visibleItems.length}`;
    }

    function goToNext() {
      if (!visibleItems.length) return;
      currentModalIndex = (currentModalIndex + 1) % visibleItems.length;
      updateModal();
    }

    function goToPrev() {
      if (!visibleItems.length) return;
      currentModalIndex = (currentModalIndex - 1 + visibleItems.length) % visibleItems.length;
      updateModal();
    }

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      renderFeed();
    });

    closeModalBtn.addEventListener('click', closeModal);
    nextModalBtn.addEventListener('click', goToNext);
    prevModalBtn.addEventListener('click', goToPrev);

    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    document.addEventListener('keydown', (event) => {
      if (!modal.classList.contains('open')) return;
      if (event.key === 'Escape') closeModal();
      if (event.key === 'ArrowRight') goToNext();
      if (event.key === 'ArrowLeft') goToPrev();
    });

    renderFeed();
  </script>
</body>
</html>
